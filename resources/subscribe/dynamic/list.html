<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:sans-serif; background:#1a1a2e; color:#eee; max-width:500px; padding:20px; }
  .title { font-size:20px; color:#fb7299; margin-bottom:16px; text-align:center; }
  .item { background:#2a2a3e; border-radius:8px; padding:12px; margin-bottom:8px; }
  .item .name { font-size:16px; font-weight:bold; }
  .item .uid { font-size:12px; color:#888; }
  .item .types { font-size:12px; color:#aaa; margin-top:4px; }
  .empty { text-align:center; color:#888; padding:40px 0; }
  .footer { font-size:12px; color:#666; text-align:right; margin-top:16px; }
</style>
</head>
<body>
  <div class="title">动态订阅列表 ({{count}})</div>
  {{if !items || items.length === 0}}
  <div class="empty">暂无订阅</div>
  {{else}}
  {{each items}}
  <div class="item">
    <div class="name">{{$value.name}}</div>
    <div class="uid">UID: {{$value.uid}}</div>
    <div class="types">{{$value.types}}</div>
  </div>
  {{/each}}
  {{/if}}
  <div class="footer">LinkFlow {{version}} · Yunzai {{yunzaiVersion}}</div>
</body>
</html>
