<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:sans-serif; background:#1a1a2e; color:#eee; width:600px; padding:20px; }
  .header { display:flex; align-items:center; margin-bottom:16px; }
  .avatar { width:48px; height:48px; border-radius:50%; margin-right:12px; }
  .name { font-size:18px; font-weight:bold; color:#fb7299; }
  .type-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:12px; background:#fb7299; color:#fff; margin-left:8px; }
  .text { font-size:15px; line-height:1.6; margin-bottom:12px; white-space:pre-wrap; word-break:break-word; }
  .image { max-width:100%; border-radius:8px; margin-bottom:8px; }
  .images { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; margin-bottom:8px; }
  .images img { width:100%; border-radius:4px; }
  .video-cover { max-width:100%; border-radius:8px; margin-bottom:8px; }
  .forward { background:#2a2a3e; border-radius:8px; padding:12px; margin-top:8px; }
  .forward .name { font-size:14px; color:#aaa; }
  .footer { font-size:12px; color:#888; margin-top:12px; text-align:right; }
</style>
</head>
<body>
  <div class="header">
    {{if upFace}}<img class="avatar" src="{{upFace}}" />{{/if}}
    <div>
      <span class="name">{{upName}}</span>
      <span class="type-badge">{{typeLabel}}</span>
    </div>
  </div>
  {{if text}}<div class="text">{{text}}</div>{{/if}}
  {{if videoCover}}<img class="video-cover" src="{{videoCover}}" />{{/if}}
  {{if pics && pics.length}}
  <div class="images">
    {{each pics}}<img src="{{$value}}" />{{/each}}
  </div>
  {{/if}}
  {{if forwardText}}
  <div class="forward">
    <div class="name">@{{forwardUpName}}</div>
    <div>{{forwardText}}</div>
  </div>
  {{/if}}
  <div class="footer">LinkFlow {{version}} · Yunzai {{yunzaiVersion}}</div>
</body>
</html>
